<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
</head>

<body>
    <h2>Reset Your Password</h2>

    <form method="post" action="https://localhost:44361/api/Account/ResetPassword">
        <input type="hidden" name="email" id="email"> <input type="hidden" name="token" id="token">
        <label>New Password</label>
        <input type="password" name="newPassword" required><br><br>
        <label>Confirm Password</label>
        <input type="password" name="confirmPassword" required><br><br>
        <button type="submit">Reset Password</button>
        <script>
        const params = new URLSearchParams(window.location.search); <!-- search after ? -->
        document.getElementById("email").value = params.get("email"); <!-- put the value of email in url in input with id email-->
        document.getElementById("token").value = params.get("token"); <!-- put the value of email in url in input with id token-->
        </script>
    </form>


</body>

</html>
